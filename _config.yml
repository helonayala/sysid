# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: SYSID
author: Helon Ayala
logo: logo.png

# Force re-execution of notebooks on each build.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: force
  timeout: 300  # seconds per cell; free-run NARX simulations can be slow
  exclude_patterns:
    # Slow / external-data notebooks: not re-executed in CI. They render the
    # outputs committed from local/Colab runs instead. (grey_box_activity_2b
    # is intentionally NOT here: it has no committed outputs, so it must keep
    # executing or its page would be blank.)
    - "wind_blade.ipynb"            # external Zenodo download (~600s, failed)
    - "IFAC2015_LTV.ipynb"          # external KTH download (~200s)
    - "narmax_activity_2.ipynb"     # free-run NARX simulation (~113s)
    - "narx_mpc_14_drone.ipynb"     # MPC / ipopt loop (~75s)
    - "bab_ann_mpc_approximation.ipynb"  # ANN-MPC / casadi (~51s)

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: book.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# Information about where the book exists on the web
repository:
  url: https://github.com/helonayala/sysid  # Online location of your book
  path_to_book: ""  # Book lives at the repository root
  branch: main  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true

sphinx:
  config:
    html_show_copyright: false
